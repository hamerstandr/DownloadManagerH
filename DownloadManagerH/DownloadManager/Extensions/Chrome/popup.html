<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود منجر حامد</title>
    <style>
        body {
            width: 350px;
            min-height: 400px;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            direction: rtl;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }
        
        .header .version {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .content {
            padding: 20px;
        }
        
        .status-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #44ff44;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .action-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .action-btn .icon {
            font-size: 20px;
        }
        
        .url-input-section {
            margin-bottom: 15px;
        }
        
        .url-input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 14px;
            box-sizing: border-box;
            direction: ltr;
            text-align: left;
        }
        
        .url-input::placeholder {
            color: #666;
            direction: rtl;
            text-align: right;
        }
        
        .send-btn {
            width: 100%;
            background: #4CAF50;
            border: none;
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        
        .send-btn:hover {
            background: #45a049;
        }
        
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .stats-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        
        .stat-item .number {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }
        
        .stat-item .label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .footer {
            padding: 15px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.1);
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .footer-link {
            color: white;
            text-decoration: none;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .footer-link:hover {
            opacity: 1;
        }
        
        .notification {
            position: fixed;
            top: 10px;
            right: 10px;
            left: 10px;
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateY(0);
        }
        
        .notification.error {
            background: #f44336;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 دانلود منجر حامد</h1>
        <div class="version">نسخه 2.0.0</div>
    </div>
    
    <div class="content">
        <div class="status-section">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">در حال بررسی اتصال...</span>
            </div>
            <div id="connectionInfo" style="font-size: 12px; opacity: 0.8;"></div>
        </div>
        
        <div class="quick-actions">
            <button class="action-btn" id="detectLinksBtn">
                <span class="icon">🔍</span>
                <span>تشخیص لینک‌ها</span>
            </button>
            <button class="action-btn" id="openAppBtn">
                <span class="icon">📱</span>
                <span>باز کردن برنامه</span>
            </button>
            <button class="action-btn" id="settingsBtn">
                <span class="icon">⚙️</span>
                <span>تنظیمات</span>
            </button>
            <button class="action-btn" id="helpBtn">
                <span class="icon">❓</span>
                <span>راهنما</span>
            </button>
        </div>
        
        <div class="url-input-section">
            <input type="text" class="url-input" id="urlInput" placeholder="لینک دانلود را اینجا وارد کنید...">
            <button class="send-btn" id="sendUrlBtn">
                <span id="sendBtnText">ارسال به دانلود منجر 🚀</span>
                <span id="sendBtnLoading" class="loading" style="display: none;"></span>
            </button>
        </div>
        
        <div class="stats-section">
            <h3 style="margin: 0 0 15px 0; font-size: 16px;">آمار امروز</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="number" id="todayDownloads">-</span>
                    <span class="label">دانلود ارسال شده</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="totalDownloads">-</span>
                    <span class="label">کل دانلودها</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-links">
            <a href="#" class="footer-link" id="aboutLink">درباره</a>
            <a href="#" class="footer-link" id="supportLink">پشتیبانی</a>
            <a href="#" class="footer-link" id="rateLink">امتیاز دهی</a>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script src="popup.js"></script>
</body>
</html>
